<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta | Inicia Seción</title>
    <link rel="stylesheet" href="./css/estilosLogin.css">
    <link rel="shortcut icon" href="./img/motoIcono.png" type="image/x-icon">
      <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Oswald:wght@200..700&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">

</head>
<body>

    
 
    <section class="containerLogo">
        <img src="./img/logoLogin.png" alt="iamgen de login">
    </section>

    <h1>Crear <label>Cuenta</label></h1>

    <form action="" class="containFormulario">
        <input type="text" placeholder="Nombre Completo" class="input N1" required>
        <input type="tel" placeholder="Numero de telefono" maxlength="10" class="input N2" required>
        <input type="password" inputmode="numeric" placeholder="Pin de 4 digitos" maxlength="4" class="input N3" required>
        <input type="submit" class="buton" >
    </form>
    
</body>
</html>
