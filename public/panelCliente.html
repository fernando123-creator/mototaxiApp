    <main class="contenedorDePedidos">

        <section class="tipoServicio">
            <span><h3>Tipo de servicio:</h3></span>

          <label>
            Transporte
             <input type="radio" name="servicio" class="inputRadio" value="transporte">
        
        </label>

        <label>
           Encargo
             <input type="radio" name="servicio" class="inputRadio" value="encargo">
        
        </label>
     </section>

        <form class="panelCliente" id="formTransporte">

        <label>Nombre:</label>
        <input type="text" class="N1" id="nombre" placeholder="Nombre Completo">

        <label>Telefono:</label>
        <input type="tel" class="N2" id="telefono" placeholder="Número de telefono">

        <label>Destino:</label>
        <input type="text" class="N4" id="destino" placeholder="¿Donde entregar?">

        <div class="botones">
        <button type="button">mandar ubicación</button>
        <button id="pedirServicio" type="submit">Pedir servicio</button>
        </div>

        </form>

        <form class="panelCliente" id="formEncargo">

        <label>Nombre:</label>
        <input type="text" class="N1" id="nombreE" placeholder="Nombre Completo">

        <label>Telefono:</label>
        <input type="tel" class="N2" id="telefonoE" placeholder="Número de telefono">

        <label>Descripcion:</label>
        <input type="text" class="N3" id="descripcionE" placeholder="¿Que hay que traer?">

        <label>Destino:</label>
        <input type="text" class="N4" id="destinoE" placeholder="¿Donde entregar?">

        <div class="botones">
        <button type="button">mandar ubicación</button>
        <button id="pedirServicio" type="submit">Pedir servicio</button>
        </div>

        </form>

    </main>
 </div>
